<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Original Slot Machine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-family:'Courier New',monospace;color:#ffd700;user-select:none;}

/* Title banner */
#title-bar{
  width:100%;max-width:700px;
  text-align:center;padding:12px 0 4px;
  font-size:clamp(24px,5vw,40px);
  font-weight:bold;
  letter-spacing:4px;
  background:linear-gradient(135deg,#ffd700,#ff8800,#ffd700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#subtitle{font-size:12px;letter-spacing:6px;color:#a78bfa;text-align:center;margin-bottom:8px;}

/* Main layout */
#game{
  width:100%;max-width:700px;
  display:flex;flex-direction:column;
  align-items:center;
  gap:0;
  padding:0 8px 16px;
}

/* Slot machine image container */
#machine-wrap{
  position:relative;
  width:100%;
  max-width:660px;
}
#machine-bg{
  width:100%;
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

/* Reels overlay - positioned over the machine image windows */
#reels-overlay{
  position:absolute;
  /* These percentages tuned to the slot_machine.png artwork */
  top:22%;left:12%;width:76%;height:52%;
  display:flex;
  gap:2.5%;
}
.reel-col{
  flex:1;
  overflow:hidden;
  position:relative;
  background:#000;
}
.reel-strip{
  display:flex;
  flex-direction:column;
  will-change:transform;
}
.reel-cell{
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}
.reel-cell img{
  width:80%;
  height:80%;
  object-fit:contain;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

/* Payline highlight */
.payline-flash{
  position:absolute;
  left:0;right:0;
  top:33.33%;height:33.34%;
  border-top:2px solid rgba(255,215,0,0.6);
  border-bottom:2px solid rgba(255,215,0,0.6);
  pointer-events:none;
  z-index:10;
  opacity:0;
  transition:opacity 0.2s;
}
.payline-flash.active{opacity:1;animation:payPulse 0.5s ease-in-out infinite alternate;}
@keyframes payPulse{from{background:rgba(255,215,0,0.05);}to{background:rgba(255,215,0,0.18);}}

/* Arrow buttons */
.arrow-group{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.arrow-group.visible{opacity:1;pointer-events:all;}
.arrow-btn{
  cursor:pointer;
  width:28px;height:28px;
  background:rgba(0,100,255,0.7);
  border:1px solid #44f;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  color:#fff;
  transition:background 0.15s,transform 0.1s;
}
.arrow-btn:hover{background:rgba(0,150,255,0.9);}
.arrow-btn:active{transform:scale(0.9);}

/* Controls row */
#controls{
  width:100%;
  display:flex;
  align-items:stretch;
  gap:8px;
  margin-top:6px;
}

/* Treasure + Jackpot box */
#jackpot-box{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,0,0,0.5);border:1px solid #553;
  border-radius:8px;padding:6px 8px;min-width:90px;
}
#jackpot-box img{width:48px;image-rendering:pixelated;}
#jackpot-label{font-size:9px;letter-spacing:2px;color:#aaa;margin-top:2px;}
#jackpot-value{font-size:20px;font-weight:bold;color:#ffd700;}

/* Bet box */
#bet-box{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.5);border:1px solid #553;border-radius:8px;padding:6px;
  gap:4px;
}
.stat-row{display:flex;justify-content:space-between;width:100%;gap:8px;}
.stat-cell{flex:1;text-align:center;}
.stat-label{font-size:9px;letter-spacing:2px;color:#888;text-transform:uppercase;}
.stat-val{font-size:18px;font-weight:bold;}
.stat-val.gold{color:#ffd700;}
.stat-val.green{color:#4ade80;}
.stat-val.red{color:#f87171;}

#bet-controls{display:flex;align-items:center;gap:6px;margin-top:2px;}
#bet-label{font-size:10px;letter-spacing:2px;color:#888;}
.bet-btn{
  background:rgba(80,60,0,0.6);border:1px solid #884;border-radius:6px;
  color:#ffd700;font-size:16px;font-weight:bold;
  width:28px;height:28px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.1s;
}
.bet-btn:hover{background:rgba(140,100,0,0.8);}
.bet-btn:active{transform:scale(0.92);}
#bet-val{font-size:18px;font-weight:bold;color:#ffd700;min-width:32px;text-align:center;}

/* Spin button */
#spin-area{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
}
#spin-btn{
  cursor:pointer;
  width:80px;height:56px;
  object-fit:contain;
  image-rendering:pixelated;
  transition:transform 0.1s,filter 0.15s;
  filter:drop-shadow(0 2px 8px rgba(255,200,0,0.4));
}
#spin-btn:hover:not(.disabled){filter:drop-shadow(0 4px 16px rgba(255,200,0,0.7));transform:scale(1.04);}
#spin-btn.disabled{opacity:0.45;cursor:not-allowed;}
#spin-caption{font-size:9px;letter-spacing:3px;color:#888;}

/* Message */
#message{
  width:100%;text-align:center;
  min-height:26px;
  font-size:15px;letter-spacing:2px;
  color:#ffd700;
  font-weight:bold;
  margin:4px 0;
  filter:drop-shadow(0 0 6px rgba(255,215,0,0.5));
  transition:opacity 0.3s;
}
#message.dim{opacity:0.2;}

/* Super powers tray */
#powers-tray{
  width:100%;
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:flex-start;
  min-height:52px;
  padding:4px 0;
}
.power-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  opacity:0.25;
  transition:opacity 0.3s,transform 0.15s;
  cursor:pointer;
}
.power-item.available{opacity:1;}
.power-item.selected{
  outline:2px solid #4af;
  border-radius:4px;
  padding:2px;
  transform:scale(1.08);
}
.power-item img{width:44px;image-rendering:pixelated;}
.power-label{font-size:8px;letter-spacing:1px;color:#aaa;}

/* Paytable */
#paytable{
  width:100%;
  background:rgba(0,0,0,0.35);
  border:1px solid #333;
  border-radius:10px;
  padding:8px 10px;
  margin-top:4px;
}
#paytable-title{font-size:10px;letter-spacing:4px;color:#888;text-align:center;margin-bottom:6px;}
#pay-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
}
.pay-row{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.03);
  border-radius:5px;padding:3px 5px;
}
.pay-sym img{width:20px;image-rendering:pixelated;}
.pay-info{display:flex;flex-direction:column;}
.pay-pct{font-size:13px;font-weight:bold;color:#ffd700;}
.pay-desc{font-size:9px;color:#666;}

/* History */
#history{
  width:100%;display:flex;flex-wrap:wrap;gap:4px;min-height:20px;justify-content:center;
  margin-top:2px;
}
.hist-chip{
  font-size:10px;padding:1px 6px;border-radius:12px;font-weight:bold;
}
.hist-win{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.3);}
.hist-loss{background:rgba(248,113,113,0.1);color:#f87171;border:1px solid rgba(248,113,113,0.2);}
.hist-two{background:rgba(167,139,250,0.1);color:#a78bfa;border:1px solid rgba(167,139,250,0.2);}

/* Bust overlay */
#bust{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.88);
  z-index:200;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#bust.show{display:flex;}
#bust-title{font-size:56px;font-weight:bold;color:#f87171;letter-spacing:6px;filter:drop-shadow(0 0 16px rgba(248,113,113,0.7));}
#bust-sub{font-size:14px;letter-spacing:3px;color:#888;}
#bust-btn{
  padding:12px 36px;background:#7c3aed;border:none;border-radius:10px;
  color:#fff;font-family:inherit;font-size:20px;letter-spacing:4px;cursor:pointer;
  transition:background 0.2s;
}
#bust-btn:hover{background:#6d28d9;}
</style>
</head>

  { key:"horseshoe",name:"Horseshoe",    img:IMG.horseshoe,     pct:0.52  },

/* ──────────────────────────────── STATE ─────────────────── */
let jackpot   = 500;
let credits   = 5;
let bet       = 1;
let spinning  = false;
let history   = [];
let powers    = [];        // 'WILD_CARD', 'REEL_SPIN', 'SOAP'
let selPower  = null;
let spinArrows = false;

// reelResults[0..8]: index 0,1,2 = reel1 bottom/mid/top; 3,4,5 = reel2; 6,7,8 = reel3
let reelResults = Array(9).fill(0);
// activeSymbols: which symbol indices are currently available (soap removes them)
let activeSymbols = SYMBOLS.map((_,i)=>i);

/* ──────────────────────────────── INIT ─────────────────── */
function initImgs() {
  // Set machine background
  document.getElementById("machine-bg").src = IMG.slot_machine;
  document.getElementById("spin-btn").src    = IMG.spin_button;
  document.querySelector("#jackpot-box img").src = IMG.treasure_chest;
  document.getElementById("pw-wildcard").querySelector("img").src = IMG.wild_card_mini;
  document.getElementById("pw-reelspin").querySelector("img").src = IMG.spin_wheel_mini;
  document.getElementById("pw-soap").querySelector("img").src     = IMG.irish_soap_mini;
}

function buildPaytable() {
  const grid = document.getElementById("pay-grid");
  grid.innerHTML = "";
  SYMBOLS.forEach((s,i) => {
    const row = document.createElement("div");
    row.className = "pay-row";
    row.id = "pay-" + i;
    row.innerHTML = `<div class="pay-sym"><img src="${s.img}" alt="${s.name}"></div>
      <div class="pay-info">
        <div class="pay-pct">${Math.round(s.pct*100)}%</div>
        <div class="pay-desc">${s.name}</div>
      </div>`;
    grid.appendChild(row);
  });
}

function buildStrips() {
  for (let r = 0; r < 3; r++) {
    const strip = document.getElementById("rs" + r);
    strip.innerHTML = "";
    for (let j = 0; j < 20; j++) {
      const si = activeSymbols[Math.floor(Math.random() * activeSymbols.length)];
      addCell(strip, si);
    }
  }
}

function addCell(strip, symIdx) {
  const cell = document.createElement("div");
  cell.className = "reel-cell";
  const img = document.createElement("img");
  img.src = SYMBOLS[symIdx].img;
  img.alt = SYMBOLS[symIdx].name;
  cell.appendChild(img);
  strip.appendChild(cell);
}

function resizeReels() {
  // Cell height = 1/3 of the reel column height
  const cols = document.querySelectorAll(".reel-col");
  cols.forEach(col => {
    const h = col.clientHeight;
    const cells = col.querySelectorAll(".reel-cell");
    cells.forEach(c => c.style.height = (h/3) + "px");
  });
}

/* ──────────────────────────────── GAME LOGIC (from Java) ─────────────────── */
function randSym() {
  return activeSymbols[Math.floor(Math.random() * activeSymbols.length)];
}

function randSymExcluding(...excluded) {
  let r;
  do { r = randSym(); } while (excluded.includes(r));
  return r;
}

function generateReelNumbers() {
  // Mirrors SlotMachine.java generateReelNumbers()
  // Each reel shows 3 unique symbols
  const n = activeSymbols.length;
  reelResults[0] = randSym();
  reelResults[1] = randSymExcluding(reelResults[0]);
  reelResults[2] = randSymExcluding(reelResults[0], reelResults[1]);

  reelResults[3] = randSym();
  reelResults[4] = randSymExcluding(reelResults[3]);
  reelResults[5] = randSymExcluding(reelResults[3], reelResults[4]);

  reelResults[6] = randSym();
  reelResults[7] = randSymExcluding(reelResults[6]);
  reelResults[8] = randSymExcluding(reelResults[6], reelResults[7]);
}

function checkForMiddleRowMatches() {
  // Indices 1, 4, 7 are the middle row
  const m = [reelResults[1], reelResults[4], reelResults[7]];
  let msg = "";

  if (m[0] === m[1] && m[1] === m[2]) {
    msg = "★ THREE OF A KIND! ★";
    addWonJackpotPrize(m[0]);
    spinArrows = false;
  } else if (m[0] === m[1]) {
    msg = "Two matches! You earned a power!";
    assignSuperPower();
    spinArrows = canNudgeToThree(m[0]);
  } else if (m[1] === m[2]) {
    msg = "Two matches! You earned a power!";
    assignSuperPower();
    spinArrows = canNudgeToThree(m[1]);
  } else if (m[0] === m[2]) {
    msg = "Two matches! Adjust the middle reel!";
    assignSuperPower();
    spinArrows = canNudgeToThree(m[0]);
  } else {
    msg = "No matches this round.";
    spinArrows = hasAnyMatchesAcrossBoard();
    if (spinArrows) msg = "No middle match — but arrows available!";
  }

  setMessage(msg);
  updateArrows();
  return msg;
}

function canNudgeToThree(matchSym) {
  // check if matchSym appears anywhere in the non-middle rows of reel2
  // i.e. can nudging reel2 (indices 3,5) produce a 3-in-a-row?
  return [reelResults[3], reelResults[5]].includes(matchSym) ||
         [reelResults[0], reelResults[2]].includes(matchSym) ||
         [reelResults[6], reelResults[8]].includes(matchSym);
}

function hasAnyMatchesAcrossBoard() {
  const counts = {};
  reelResults.forEach(v => counts[v] = (counts[v]||0)+1);
  return Object.values(counts).some(c => c >= 2);
}

function addWonJackpotPrize(symIdx) {
  const earned = Math.round(SYMBOLS[symIdx].pct * jackpot);
  jackpot -= earned;
  credits += earned;
  if (jackpot < 1) jackpot = 1;
  addHistory("win", earned);
  flashPayline();
  updateUI();
}

/* Nudge reel up(+1) or down(-1) */
function nudgeReel(reelNum, dir) {
  // reelNum 0,1,2 = left/mid/right
  const base = reelNum * 3; // 0,3,6
  if (dir === 1) { // moveReelUp
    reelResults[base+2] = reelResults[base+1];
    reelResults[base+1] = reelResults[base+0];
    reelResults[base+0] = randSymExcluding(reelResults[base+2], reelResults[base+1]);
  } else { // moveReelDown
    reelResults[base+0] = reelResults[base+1];
    reelResults[base+1] = reelResults[base+2];
    reelResults[base+2] = randSymExcluding(reelResults[base+0], reelResults[base+1]);
  }
  spinArrows = false;
  updateArrows();
  displayStaticReels();
  checkForMiddleRowMatches();
}

function assignSuperPower() {
  const opts = ["WILD_CARD","REEL_SPIN","SOAP"];
  const pick = opts[Math.floor(Math.random() * 3)];
  if (!powers.includes(pick)) {
    powers.push(pick);
    updatePowersTray();
  }
}

/* WILD CARD: force 2-match into 3-match */
function useWildCard() {
  const m = [reelResults[1], reelResults[4], reelResults[7]];
  if (m[0]===m[1]) {
    reelResults[7] = m[0];
  } else if (m[1]===m[2]) {
    reelResults[1] = m[1];
  } else if (m[0]===m[2]) {
    reelResults[4] = m[0];
  }
  powers = powers.filter(p => p !== "WILD_CARD");
  checkForMiddleRowMatches();
  displayStaticReels();
  updatePowersTray();
}

/* REEL SPIN: re-spin the odd reel out */
function useReelSpin() {
  const m = [reelResults[1], reelResults[4], reelResults[7]];
  let reelToSpin = -1;
  if (m[0]===m[1] && m[1]!==m[2]) reelToSpin = 2;
  else if (m[1]===m[2] && m[0]!==m[1]) reelToSpin = 0;
  else if (m[0]===m[2] && m[1]!==m[0]) reelToSpin = 1;
  if (reelToSpin >= 0) {
    const base = reelToSpin * 3;
    reelResults[base]   = randSymExcluding(reelResults[1], reelResults[4], reelResults[7]);
    reelResults[base+1] = randSymExcluding(reelResults[base]);
    reelResults[base+2] = randSymExcluding(reelResults[base], reelResults[base+1]);
    powers = powers.filter(p => p !== "REEL_SPIN");
    animateSingleReel(reelToSpin, reelResults[base], reelResults[base+1], reelResults[base+2]);
    checkForMiddleRowMatches();
    updatePowersTray();
  }
}

/* SOAP: remove middle-row symbols from the pool */
function useSoap() {
  if (activeSymbols.length <= 3) { setMessage("Can't remove any more symbols!"); return; }
  const toRemove = new Set([reelResults[1], reelResults[4], reelResults[7]]);
  activeSymbols = activeSymbols.filter(i => !toRemove.has(i));
  powers = powers.filter(p => p !== "SOAP");
  // grey out removed symbols in paytable
  SYMBOLS.forEach((_,i) => {
    const el = document.getElementById("pay-"+i);
    if (el) el.style.opacity = activeSymbols.includes(i) ? "1" : "0.25";
  });
  generateReelNumbers();
  displayStaticReels();
  checkForMiddleRowMatches();
  updatePowersTray();
  setMessage("Soap used! Those symbols are gone!");
}

/* ──────────────────────────────── POWER SELECTION ─────────────────── */
function selectPower(p) {
  if (!powers.includes(p)) return;
  if (selPower === p) {
    selPower = null;
  } else {
    selPower = p;
  }
  updatePowersTray();
}

function handleMachineClick() {
  if (!selPower) return;
  if (selPower === "WILD_CARD") useWildCard();
  else if (selPower === "REEL_SPIN") useReelSpin();
  else if (selPower === "SOAP") useSoap();
  selPower = null;
  updatePowersTray();
}

/* ──────────────────────────────── SPIN ─────────────────── */
async function doSpin() {
  if (spinning || credits < bet) return;
  credits -= bet;
  jackpot += Math.floor(bet * 0.05); // small jackpot contribution
  spinning = true;
  setMessage("");
  document.getElementById("spin-btn").classList.add("disabled");
  document.getElementById("payline-flash").classList.remove("active");
  spinArrows = false;
  updateArrows();

  generateReelNumbers();
  await animateAllReels();

  displayStaticReels();
  checkForMiddleRowMatches();
  spinning = false;
  document.getElementById("spin-btn").classList.remove("disabled");
  updateUI();

  if (credits <= 0 && jackpot < bet) {
    setTimeout(() => document.getElementById("bust").classList.add("show"), 1000);
  }
}

/* ──────────────────────────────── REEL ANIMATION ─────────────────── */
function animateAllReels() {
  return new Promise(resolve => {
    const durations = [700, 950, 1200];
    let done = 0;
    [0,1,2].forEach(r => {
      animateSingleReelAnim(r, durations[r], () => {
        done++;
        if (done === 3) resolve();
      });
    });
  });
}

function animateSingleReelAnim(reelIdx, duration, cb) {
  const strip = document.getElementById("rs" + reelIdx);
  const col   = document.getElementById("rc" + reelIdx);
  const cellH = col.clientHeight / 3;

  // rebuild strip with target in middle (index 1 = middle row)
  strip.innerHTML = "";
  const count = 18;
  const midPos = Math.floor(count / 2);
  const targets = [reelResults[reelIdx*3], reelResults[reelIdx*3+1], reelResults[reelIdx*3+2]];
  for (let i = 0; i < count; i++) {
    let si;
    if (i === midPos - 1) si = targets[0];   // bottom
    else if (i === midPos)   si = targets[1]; // middle
    else if (i === midPos + 1) si = targets[2]; // top
    else si = activeSymbols[Math.floor(Math.random() * activeSymbols.length)];
    addCell(strip, si);
  }
  const cells = strip.querySelectorAll(".reel-cell");
  cells.forEach(c => c.style.height = cellH + "px");

  strip.style.transition = "none";
  strip.style.transform = "translateY(0)";

  const finalY = -(midPos - 1) * cellH;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    strip.style.transition = `transform ${duration}ms cubic-bezier(0.22,1,0.36,1)`;
    strip.style.transform = `translateY(${finalY}px)`;
    strip.addEventListener("transitionend", function h() {
      strip.removeEventListener("transitionend", h);
      // bounce
      strip.style.transition = "transform 70ms ease-out";
      strip.style.transform = `translateY(${finalY + 8}px)`;
      setTimeout(() => {
        strip.style.transition = "transform 55ms ease-in";
        strip.style.transform = `translateY(${finalY}px)`;
        setTimeout(cb, 60);
      }, 72);
    });
  }));
}

function animateSingleReel(reelIdx, b, m, t) {
  // just snap-display, no full animation
  displayStaticReels();
}

function displayStaticReels() {
  for (let r = 0; r < 3; r++) {
    const strip = document.getElementById("rs" + r);
    const col   = document.getElementById("rc" + r);
    const cellH = col.clientHeight / 3;
    strip.style.transition = "none";
    strip.style.transform = "translateY(0)";
    strip.innerHTML = "";
    // bottom = index base+0, middle = base+1, top = base+2
    const base = r * 3;
    [reelResults[base], reelResults[base+1], reelResults[base+2]].forEach(si => {
      const cell = document.createElement("div");
      cell.className = "reel-cell";
      cell.style.height = cellH + "px";
      const img = document.createElement("img");
      img.src = SYMBOLS[si].img;
      img.alt = SYMBOLS[si].name;
      cell.appendChild(img);
      strip.appendChild(cell);
    });
  }
}

function flashPayline() {
  const pf = document.getElementById("payline-flash");
  pf.classList.add("active");
}

/* ──────────────────────────────── UI ─────────────────── */
function updateUI() {
  document.getElementById("sv-credits").textContent = credits;
  document.getElementById("sv-bet").textContent = bet;
  document.getElementById("jackpot-value").textContent = jackpot;
  document.getElementById("bet-val").textContent = bet;
}

function setMessage(txt) {
  const el = document.getElementById("message");
  el.textContent = txt || "—";
  el.classList.toggle("dim", !txt);
}

function adjBet(d) {
  bet = Math.max(1, Math.min(credits, bet + d));
  updateUI();
}

function updateArrows() {
  [0,1,2].forEach(r => {
    const ag = document.getElementById("arrows"+r);
    ag.classList.toggle("visible", spinArrows);
  });
}

function updatePowersTray() {
  ["WILD_CARD","REEL_SPIN","SOAP"].forEach(p => {
    const idMap = {"WILD_CARD":"pw-wildcard","REEL_SPIN":"pw-reelspin","SOAP":"pw-soap"};
    const el = document.getElementById(idMap[p]);
    el.classList.toggle("available", powers.includes(p));
    el.classList.toggle("selected", selPower === p);
  });
}

function addHistory(type, amount) {
  history.unshift({type, amount});
  if (history.length > 10) history.pop();
  const el = document.getElementById("history");
  el.innerHTML = history.map(h => {
    const cls = h.type === "win" ? "hist-win" : h.type === "two" ? "hist-two" : "hist-loss";
    const txt = h.type === "win" ? `+${h.amount}` : h.type === "loss" ? `-${h.amount}` : "2x";
    return `<span class="hist-chip ${cls}">${txt}</span>`;
  }).join("");
}

function resetGame() {
  credits = 5;
  bet = 1;
  jackpot = 500;
  powers = [];
  selPower = null;
  spinArrows = false;
  history = [];
  activeSymbols = SYMBOLS.map((_,i)=>i);
  SYMBOLS.forEach((_,i) => {
    const el = document.getElementById("pay-"+i);
    if (el) el.style.opacity = "1";
  });
  document.getElementById("bust").classList.remove("show");
  document.getElementById("payline-flash").classList.remove("active");
  document.getElementById("history").innerHTML = "";
  generateReelNumbers();
  displayStaticReels();
  updateArrows();
  updatePowersTray();
  updateUI();
  setMessage("Welcome back! Press SPIN to play.");
}

/* ──────────────────────────────── EVENTS ─────────────────── */
document.addEventListener("keydown", e => {
  if (e.code === "Space") { e.preventDefault(); doSpin(); }
});
document.getElementById("machine-wrap").addEventListener("click", e => {
  if (!e.target.classList.contains("arrow-btn")) handleMachineClick();
});
window.addEventListener("resize", () => {
  displayStaticReels();
  resizeReels();
});

/* ──────────────────────────────── BOOT ─────────────────── */
initImgs();
buildPaytable();
generateReelNumbers();
displayStaticReels();
updateArrows();
updatePowersTray();
updateUI();
setMessage("Welcome! Press SPIN to play.");
</script>
</body>

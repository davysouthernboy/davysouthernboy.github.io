  <style>
    :root {
      --border: #e6e6e6;
      --text: #1a1a1a;
      --muted: #666;
      --blue: #0b5ed7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fafafa;
      color: var(--text);
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .meta {
      display: grid;
      gap: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .meta div {
      display: flex;
      justify-content: space-between;
    }

    .label {
      color: var(--muted);
      font-weight: 600;
    }

    .value {
      font-weight: 800;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0 24px;
    }

    .btn {
      text-decoration: none;
      padding: 12px 18px;
      font-weight: 800;
      border-radius: 8px;
      text-align: center;
      display: inline-block;
    }

    .btn.primary {
      background: var(--blue);
      color: white;
    }

    .btn.secondary {
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--blue);
    }

    /* PHOTO GRID */
    .photo-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (min-width: 768px) {
      .photo-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .photo-grid img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f1f1f1;
    }

    footer {
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
